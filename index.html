    // ================= ENHANCED REPORTS COMPONENT =================
    function EnhancedReports({ products, movements, users, exportToExcel, exportToWord, helpers }) {
      const [reportType, setReportType] = React.useState('stock');
      const [filters, setFilters] = React.useState({
        status: [],
        startDate: '',
        endDate: ''
      });
      
      const filterData = () => {
        if (reportType === 'stock') {
          let filteredProducts = [...products];
          
          // Filter by status
          if (filters.status && filters.status.length > 0) {
            filteredProducts = filteredProducts.filter(product => {
              const status = helpers.getProductStatus(product.id, products, movements);
              return filters.status.includes(status);
            });
          }
          
          // Filter by date range (based on last movement)
          if (filters.startDate || filters.endDate) {
            filteredProducts = filteredProducts.filter(product => {
              const productMovements = movements.filter(m => m.productId === product.id);
              if (productMovements.length === 0) return true;
              
              const lastMovementDate = new Date(productMovements[productMovements.length - 1].date);
              
              if (filters.startDate) {
                const startDate = new Date(filters.startDate);
                startDate.setHours(0, 0, 0, 0);
                if (lastMovementDate < startDate) return false;
              }
              
              if (filters.endDate) {
                const endDate = new Date(filters.endDate);
                endDate.setHours(23, 59, 59, 999);
                if (lastMovementDate > endDate) return false;
              }
              
              return true;
            });
          }
          
          return filteredProducts.map(product => {
            const stock = helpers.getProductBalance(product.id, movements);
            const status = helpers.getProductStatus(product.id, products, movements);
            const costData = helpers.calculateProductCost(product.id, movements);
            
            return {
              ...product,
              currentStock: stock,
              status: status,
              totalCost: costData.totalCost,
              averageUnitCost: costData.averageUnitCost,
              currentValue: costData.currentValue
            };
          });
        } 
        else if (reportType === 'transactions') {
          let filteredMovements = [...movements];
          
          // Filter by date range
          if (filters.startDate || filters.endDate) {
            filteredMovements = filteredMovements.filter(movement => {
              const movementDate = new Date(movement.date);
              
              if (filters.startDate) {
                const startDate = new Date(filters.startDate);
                startDate.setHours(0, 0, 0, 0);
                if (movementDate < startDate) return false;
              }
              
              if (filters.endDate) {
                const endDate = new Date(filters.endDate);
                endDate.setHours(23, 59, 59, 999);
                if (movementDate > endDate) return false;
              }
              
              return true;
            });
          }
          
          // Filter by current stock status
          if (filters.status && filters.status.length > 0) {
            filteredMovements = filteredMovements.filter(movement => {
              const product = products.find(p => p.id === movement.productId);
              if (!product) return false;
              
              const currentStatus = helpers.getProductStatus(product.id, products, movements);
              return filters.status.includes(currentStatus);
            });
          }
          
          return filteredMovements.map(movement => {
            const product = products.find(p => p.id === movement.productId);
            const user = users.find(u => u.id === movement.userId);
            
            return {
              ...movement,
              productName: product ? product.name : `Product ${movement.productId}`,
              userName: user ? user.name : `User ${movement.userId}`
            };
          }).reverse();
        }
        
        return [];
      };
      
      const filteredData = filterData();
      
      const handleExportExcel = () => {
        if (reportType === 'stock') {
          const excelData = filteredData.map(item => ({
            'Product ID': item.id,
            'Product Name': item.name,
            'Unit': item.unit,
            'Current Stock': item.currentStock,
            'Reorder Level': item.reorderLevel,
            'Total Cost of Purchases (GH¢)': item.totalCost,
            'Average Unit Cost (GH¢)': item.averageUnitCost,
            'Current Inventory Value (GH¢)': item.currentValue,
            'Status': item.status === 'OUT' ? 'Out of Stock' : item.status === 'LOW' ? 'Low Stock' : 'In Stock'
          }));
          exportToExcel('stock', excelData);
        } else if (reportType === 'transactions') {
          const excelData = filteredData.map(item => ({
            'Date': helpers.formatDateShort(item.date),
            'Product': item.productName,
            'Type': item.type === 'IN' ? 'Receipt' : 'Issue',
            'Quantity': item.quantity,
            'Unit Cost (GH¢)': item.unitCost || 0,
            'Total Value (GH¢)': item.totalValue || 0,
            'Reference': item.reference || '-',
            'User': item.userName || `User ${item.userId}`,
            'Import Batch': item.importBatch || '-'
          }));
          exportToExcel('transactions', excelData);
        }
      };
      
      const handleExportWord = () => {
        exportToWord(reportType, filteredData);
      };
      
      return (
        <div className="card">
          <h3><span style={{ background: 'linear-gradient(135deg, #e74c3c, #c0392b)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>📈</span> Advanced Reports</h3>
          
          <div className="report-type-selector">
            <button 
              className={`report-type-btn ${reportType === 'stock' ? 'active' : ''}`}
              onClick={() => setReportType('stock')}
            >
              <span>📊</span> Stock Report
            </button>
            <button 
              className={`report-type-btn ${reportType === 'transactions' ? 'active' : ''}`}
              onClick={() => setReportType('transactions')}
            >
              <span>📋</span> Transaction Report
            </button>
          </div>
          
          <ReportFilters 
            filters={filters}
            setFilters={setFilters}
            reportType={reportType}
          />
          
          <div className="report-controls">
            <button 
              className="btn btn-export"
              onClick={handleExportExcel}
              disabled={filteredData.length === 0}
            >
              <span>📥</span> Export to Excel
            </button>
            <button 
              className="btn btn-export-word"
              onClick={handleExportWord}
              disabled={filteredData.length === 0}
            >
              <span>📄</span> Export to Word
            </button>
          </div>
          
          <div style={{ marginBottom: '20px', padding: '15px', background: '#f8f9fa', borderRadius: '10px' }}>
            <strong>Results:</strong> {filteredData.length} records found
            {filters.startDate && (
              <span style={{ marginLeft: '20px' }}>
                <strong>From:</strong> {new Date(filters.startDate).toLocaleDateString()}
              </span>
            )}
            {filters.endDate && (
              <span style={{ marginLeft: '20px' }}>
                <strong>To:</strong> {new Date(filters.endDate).toLocaleDateString()}
              </span>
            )}
            {filters.status.length > 0 && (
              <span style={{ marginLeft: '20px' }}>
                <strong>Status:</strong> {filters.status.join(', ')}
              </span>
            )}
          </div>
          
          {renderReportContent(reportType, filteredData, helpers, products)}
        </div>
      );
    }
    
    function renderReportContent(reportType, filteredData, helpers, products) {
      switch(reportType) {
        case 'stock':
          return (
            <div className="table-container">
              <table>
                <thead>
                  <tr>
                    <th>Product</th>
                    <th>Unit</th>
                    <th>Current Stock</th>
                    <th>Reorder Level</th>
                    <th>Total Cost of Purchases (GH¢)</th>
                    <th>Average Unit Cost (GH¢)</th>
                    <th>Current Inventory Value (GH¢)</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredData.map(item => (
                    <tr key={item.id}>
                      <td><strong>{item.name}</strong></td>
                      <td>{item.unit}</td>
                      <td style={{ fontWeight: 'bold' }}>{item.currentStock}</td>
                      <td>{item.reorderLevel}</td>
                      <td>{helpers.formatCurrency(item.totalCost)}</td>
                      <td>{helpers.formatCurrency(item.averageUnitCost)}</td>
                      <td style={{ color: '#27ae60', fontWeight: 'bold' }}>
                        {helpers.formatCurrency(item.currentValue)}
                      </td>
                      <td>
                        <span className={`status-badge status-${item.status.toLowerCase()}`}>
                          {item.status === 'OUT' ? '🛑 Out of Stock' : 
                           item.status === 'LOW' ? '⚠️ Low Stock' : '✓ In Stock'}

                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
          
        case 'transactions':
          return (
            <div className="table-container">
              <table>
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Product</th>
                    <th>Type</th>
                    <th>Quantity</th>
                    <th>Unit Cost (GH¢)</th>
                    <th>Total Value (GH¢)</th>
                    <th>Reference</th>
                    <th>User</th>
                    <th>Import Batch</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredData.map(item => (
                    <tr key={item.id}>
                      <td>{helpers.formatDateShort(item.date)}</td>
                      <td>{item.productName}</td>
                      <td>
                        <span style={{
                          color: item.type === 'IN' ? '#27ae60' : '#e74c3c',
                          fontWeight: 'bold'
                        }}>
                          {item.type === 'IN' ? 'Receipt' : 'Issue'}
                        </span>
                      </td>
                      <td>{item.quantity}</td>
                      <td>{helpers.formatCurrency(item.unitCost || 0)}</td>
                      <td style={{ fontWeight: 'bold', color: '#27ae60' }}>
                        {helpers.formatCurrency(item.totalValue || 0)}
                      </td>
                      <td>{item.reference || '-'}</td>
                      <td>{item.userName || `User ${item.userId}`}</td>
                      <td>{item.importBatch || '-'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
          
        default:
          return <div>Select a report type</div>;
      }
    }
    
    // ================= IMPORT MODAL =================
    function ImportModal({ onImport, onCancel, importData, setImportData, importErrors, setImportErrors, products, helpers }) {
      const [isDragging, setIsDragging] = React.useState(false);
      const fileInputRef = React.useRef(null);
      
      const handleFileSelect = (event) => {
        const file = event.target.files[0];
        if (file) {
          readExcelFile(file);
        }
      };
      
      const readExcelFile = (file) => {
        const reader = new FileReader();
        
        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(firstSheet);
            
            const processedData = [];
            const errors = [];
            
            jsonData.forEach((row, index) => {
              const rowNumber = index + 2;
              
              if (!row['Product Name']) {
                errors.push(`Row ${rowNumber}: Missing product name`);
                return;
              }
              
              if (!row['Quantity'] || isNaN(parseInt(row['Quantity'])) || parseInt(row['Quantity']) <= 0) {
                errors.push(`Row ${rowNumber}: Invalid quantity`);
                return;
              }
              
              const unitCost = row['Unit Cost (GH¢)'] || row['Unit Cost'];
              if (!unitCost || isNaN(parseFloat(unitCost)) || parseFloat(unitCost) < 0) {
                errors.push(`Row ${rowNumber}: Invalid unit cost`);
                return;
              }
              
              const product = products.find(p => 
                p.name.toLowerCase() === row['Product Name'].toString().toLowerCase().trim()
              );
              
              if (!product) {
                errors.push(`Row ${rowNumber}: Product "${row['Product Name']}" not found in system`);
                return;
              }
              
              processedData.push({
                productName: row['Product Name'].toString().trim(),
                quantity: parseInt(row['Quantity']),
                unitCost: parseFloat(unitCost),
                reference: row['Reference'] || `IMPORT-${Date.now()}`,
                date: row['Date'] ? new Date(row['Date']).toISOString() : new Date().toISOString()
              });
            });
            
            setImportData(processedData);
            setImportErrors(errors);
            
            if (processedData.length === 0 && errors.length > 0) {
              alert('No valid data found in file. Please check the template format.');
            }
            
          } catch (error) {
            console.error("Error reading Excel file:", error);
            alert('Error reading file. Please make sure it is a valid Excel file.');
          }
        };
        
        reader.readAsArrayBuffer(file);
      };
      
      return (
        <div className="modal-overlay">
          <div className="modal">
            <h3><span style={{ background: 'linear-gradient(135deg, #3498db, #2980b9)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>📥</span> Import Stock Received Data</h3>
            
            <div className="import-section">
              <div style={{ textAlign: 'center' }}>
                <button 
                  className="btn btn-import"
                  onClick={() => fileInputRef.current.click()}
                >
                  <span>📄</span> Select Excel File
                </button>
                <input
                  type="file"
                  ref={fileInputRef}
                  style={{ display: 'none' }}
                  accept=".xlsx,.xls"
                  onChange={handleFileSelect}
                />
              </div>
              
              <div style={{ marginTop: '20px', textAlign: 'center' }}>
                <button 
                  className="btn btn-download-template" 
                  onClick={helpers.generateImportTemplate}
                >
                  <span>📋</span> Download Template
                </button>
              </div>
            </div>
            
            {importData.length > 0 && (
              <div className="import-preview">
                <h4 style={{ color: '#1a237e', marginBottom: '15px' }}>Preview ({importData.length} records)</h4>
                <div className="table-container">
                  <table>
                    <thead>
                      <tr>
                        <th>Product Name</th>
                        <th>Quantity</th>
                        <th>Unit Cost (GH¢)</th>
                        <th>Reference</th>
                        <th>Total Value (GH¢)</th>
                      </tr>
                    </thead>
                    <tbody>
                      {importData.slice(0, 10).map((item, index) => (
                        <tr key={index}>
                          <td>{item.productName}</td>
                          <td>{item.quantity}</td>
                          <td>{helpers.formatCurrency(item.unitCost)}</td>
                          <td>{item.reference}</td>
                          <td>{helpers.formatCurrency(item.quantity * item.unitCost)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
            
            {importErrors.length > 0 && (
              <div className="alert alert-warning">
                <div>
                  <strong>Found {importErrors.length} error(s):</strong>
                  <ul style={{ marginTop: '5px', marginLeft: '20px', fontSize: '13px' }}>
                    {importErrors.slice(0, 5).map((error, index) => (
                      <li key={index}>{error}</li>
                    ))}
                  </ul>
                </div>
              </div>
            )}
            
            <div style={{ display: 'flex', gap: '10px', marginTop: '25px' }}>
              <button 
                onClick={() => onImport(importData)} 
                className="btn btn-import"
                disabled={importData.length === 0}
              >
                <span>📥</span> Import Data
              </button>
              <button onClick={onCancel} className="btn" style={{ background: 'linear-gradient(135deg, #7f8c8d 0%, #34495e 100%)' }}>
                <span>↩️</span> Cancel
              </button>
            </div>
          </div>
        </div>
      );
    }
    
    // ================= CHANGE PASSWORD MODAL =================
    function ChangePasswordModal({ onChange, onCancel, data, setData, helpers }) {
      const [validation, setValidation] = React.useState({ valid: true, message: '' });
      
      const handleNewPasswordChange = (e) => {
        const newPassword = e.target.value;
        setData({ ...data, newPassword });
        
        if (newPassword.length > 0) {
          const validationResult = helpers.validatePassword(newPassword);
          setValidation(validationResult);
        } else {
          setValidation({ valid: true, message: '' });
        }
      };
      
      return (
        <div className="modal-overlay">
          <div className="modal">
            <h3><span style={{ background: 'linear-gradient(135deg, #7f8c8d, #34495e)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>🔒</span> Change Password</h3>
            
            <div className="form-group">
              <label>Current Password</label>
              <input
                type="password"
                className="form-control"
                placeholder="Enter current password"
                value={data.currentPassword}
                onChange={(e) => setData({ ...data, currentPassword: e.target.value })}
                required
              />
            </div>
            
            <div className="form-group">
              <label>New Password</label>
              <input
                type="password"
                className="form-control"
                placeholder="Enter new password"
                value={data.newPassword}
                onChange={handleNewPasswordChange}
                required
              />
              {data.newPassword && (
                <div style={{ 
                  marginTop: '5px', 
                  fontSize: '12px',
                  color: validation.valid ? '#2ecc71' : '#e74c3c',
                  fontWeight: '600'
                }}>
                  {validation.message}
                </div>
              )}
            </div>
            
            <div className="form-group">
              <label>Confirm New Password</label>
              <input
                type="password"
                className="form-control"
                placeholder="Confirm new password"
                value={data.confirmPassword}
                onChange={(e) => setData({ ...data, confirmPassword: e.target.value })}
                required
              />
              {data.confirmPassword && data.newPassword !== data.confirmPassword && (
                <div style={{ marginTop: '5px', fontSize: '12px', color: '#e74c3c', fontWeight: '600' }}>
                  Passwords do not match
                </div>
              )}
            </div>
            
            <div style={{ display: 'flex', gap: '10px', marginTop: '25px' }}>
              <button 
                onClick={onChange} 
                className="btn"
                disabled={!validation.valid || data.newPassword !== data.confirmPassword}
              >
                <span>💾</span> Change Password
              </button>
              <button onClick={onCancel} className="btn" style={{ background: 'linear-gradient(135deg, #7f8c8d 0%, #34495e 100%)' }}>
                <span>↩️</span> Cancel
              </button>
            </div>
          </div>
        </div>
      );
    }
    
    // ================= USERS COMPONENT =================
    function Users({ users, helpers, loadData }) {
      const [showAddUserModal, setShowAddUserModal] = React.useState(false);
      const [newUser, setNewUser] = React.useState({
        username: '',
        name: '',
        password: '',
        role: 'STOREKEEPER'
      });
      
      const handleAddUser = async () => {
        try {
          if (!newUser.username || !newUser.name || !newUser.password) {
            alert('Please fill all required fields');
            return;
          }
          
          const validation = helpers.validatePassword(newUser.password);
          if (!validation.valid) {
            alert(validation.message);
            return;
          }
          
          // Check if username exists
          const existing = await db.users.where("username").equals(newUser.username).first();
          if (existing) {
            alert('Username already exists');
            return;
          }
          
          await db.users.add({
            username: newUser.username.trim(),
            name: newUser.name.trim(),
            password: newUser.password,
            role: newUser.role
          });
          
          await loadData();
          setShowAddUserModal(false);
          setNewUser({ username: '', name: '', password: '', role: 'STOREKEEPER' });
          alert('User added successfully');
        } catch (error) {
          console.error("Error adding user:", error);
          alert('Error adding user');
        }
      };
      
      return (
        <div className="card">
          <h3><span style={{ background: 'linear-gradient(135deg, #f1c40f, #f39c12)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>👥</span> User Management</h3>
          
          <div style={{ marginBottom: '25px' }}>
            <button className="btn btn-add" onClick={() => setShowAddUserModal(true)}>
              <span>👤</span> Add New User
            </button>
          </div>
          
          <div className="table-container">
            <table>
              <thead>
                <tr>
                  <th>Username</th>
                  <th>Name</th>
                  <th>Role</th>
                </tr>
              </thead>
              <tbody>
                {users.map(user => (
                  <tr key={user.id}>
                    <td><strong>{user.username}</strong></td>
                    <td>{user.name}</td>
                    <td>
                      <span style={{
                        background: user.role === 'ADMIN' ? 'linear-gradient(135deg, #e74c3c 0%, #c0392b 100%)' : 
                                   user.role === 'STOREKEEPER' ? 'linear-gradient(135deg, #2ecc71 0%, #27ae60 100%)' : 
                                   'linear-gradient(135deg, #3498db 0%, #2980b9 100%)',
                        color: 'white',
                        padding: '6px 16px',
                        borderRadius: '20px',
                        fontSize: '13px',
                        fontWeight: '600',
                        boxShadow: '0 4px 8px rgba(0,0,0,0.1)'
                      }}>
                        {user.role}
                      </span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          
          {/* Add User Modal */}
          {showAddUserModal && (
            <div className="modal-overlay">
              <div className="modal">
                <h3><span style={{ background: 'linear-gradient(135deg, #f1c40f, #f39c12)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>👤</span> Add New User</h3>
                
                <div className="form-group">
                  <label>Username *</label>
                  <input
                    type="text"
                    className="form-control"
                    placeholder="Enter username"
                    value={newUser.username}
                    onChange={(e) => setNewUser({...newUser, username: e.target.value})}
                    required
                  />
                </div>
                
                <div className="form-group">
                  <label>Full Name *</label>
                  <input
                    type="text"
                    className="form-control"
                    placeholder="Enter full name"
                    value={newUser.name}
                    onChange={(e) => setNewUser({...newUser, name: e.target.value})}
                    required
                  />
                </div>
                
                <div className="form-group">
                  <label>Password *</label>
                  <input
                    type="password"
                    className="form-control"
                    placeholder="Enter password"
                    value={newUser.password}
                    onChange={(e) => setNewUser({...newUser, password: e.target.value})}
                    required
                  />
                </div>
                
                <div className="form-group">
                  <label>Role *</label>
                  <select
                    className="form-control"
                    value={newUser.role}
                    onChange={(e) => setNewUser({...newUser, role: e.target.value})}
                  >
                    <option value="STOREKEEPER">Storekeeper</option>
                    <option value="SUPERVISOR">Supervisor</option>
                    <option value="ADMIN">Admin</option>
                  </select>
                </div>
                
                <div style={{ display: 'flex', gap: '10px', marginTop: '25px' }}>
                  <button onClick={handleAddUser} className="btn btn-add">
                    <span>➕</span> Add User
                  </button>
                  <button onClick={() => setShowAddUserModal(false)} className="btn" style={{ background: 'linear-gradient(135deg, #7f8c8d 0%, #34495e 100%)' }}>
                    <span>↩️</span> Cancel
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    
    // ================= DELETE MODAL =================
    function DeleteModal({ product, onConfirm, onCancel }) {
      return (
        <div className="modal-overlay">
          <div className="modal">
            <h3><span style={{ background: 'linear-gradient(135deg, #f1c40f, #f39c12)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>⚠️</span> Confirm Delete</h3>
            <p>Are you sure you want to delete <strong style={{ color: '#e74c3c' }}>{product.name}</strong>?</p>
            <p style={{ color: '#e74c3c', marginTop: '15px', fontSize: '14px', fontWeight: '600' }}>
              ⚠️ Note: You cannot delete products that have transaction history.
            </p>
            <div style={{ display: 'flex', gap: '10px', marginTop: '25px' }}>
              <button onClick={onConfirm} className="btn btn-delete">
                <span>🗑️</span> Delete
              </button>
              <button onClick={onCancel} className="btn" style={{ background: 'linear-gradient(135deg, #7f8c8d 0%, #34495e 100%)' }}>
                <span>↩️</span> Cancel
              </button>
            </div>
          </div>
        </div>
      );
    }
    
    // ================= RENDER APP =================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
